spring.application.name=Bankinc

# Conexión SQLite
spring.datasource.url=jdbc:sqlite:bankinc.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Dialecto para SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Hibernate crea las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ============================================================
# CONFIGURACIÓN JWT
# ============================================================
# IMPORTANTE: Cambiar esta clave en producción por una más segura
# La clave debe tener al menos 32 bytes (256 bits) para HS256
jwt.secret=bankinc-secret-key-that-is-at-least-32-bytes-long-for-hs256-security

# Tiempo de expiración del token en segundos
# 86400 = 24 horas
jwt.expiration=86400